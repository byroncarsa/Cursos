<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pricing Comparison Table">

    <title>Pricing Comparison Table</title>

    <link rel="icon" href="favicon.png" type="image/x-icon">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>Acme Plans</h1>

            <nav>
                <a href="#">Home</a>
                <a href="#">About</a>
                <a href="#">Contact</a>
            </nav>
        </header>

        <main>
            <table>
                <caption>Plan comparison</caption>
                <thead>
                    <tr>
                        <th scope="col">Plan</th>
                        <th scope="col">Storage</th>
                        <th scope="col">Projects</th>
                        <th scope="col">Support</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td scope="row">Free</td>
                        <td>5 GB</td>
                        <td>3</td>
                        <td>Email</td>
                    </tr>
                    <tr>
                        <td scope="row">Pro</td>
                        <td>100 GB</td>
                        <td>25</td>
                        <td>Priority Email</td>
                    </tr>
                    <tr>
                        <td scope="row">Business</td>
                        <td>1 TB</td>
                        <td>Unlimited</td>
                        <td>24/7 Phone</td>
                    </tr>
                    <tr>
                        <td colspan="4" class="gris">All plans include SSL and daily backups</td>
                    </tr>
                </tbody>
            </table>
        </main>

        <footer>
            <p>@2025 My Site</p>
        </footer>
    </div>
</body>
</html>
