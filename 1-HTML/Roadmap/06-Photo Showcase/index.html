<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Photo Showcase">

    <title>Photo Showcase</title>

    <link rel="icon" href="favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <p>Acme</p>

            <nav>
                <a href="#">Home</a>
                <a href="#">Galery</a>
                <a href="#">Contact</a>
            </nav>
        </header>

        <main>

            <section>
                <figure>
                    <img src="https://images.unsplash.com/photo-1478827387698-1527781a4887?q=80&w=2340&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="montañas y lago" height="500px" width="700">
                    <figcaption>Laguna en torres del paine, chile</figcaption>
                </figure>

                <figure>
                    <img src="https://images.unsplash.com/photo-1494783435443-c15feee0a80a?q=80&w=2344&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="desierto con pequeña laguna" height="500px" width="700">
                    <figcaption>Desierto en region de atacama, chile</figcaption>
                </figure>

                <figure>
                    <img src="https://images.unsplash.com/photo-1689850543263-01a52ccc6943?q=80&w=2340&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="ciudad de santiago, chile" height="500px" width="700">
                    <figcaption>Ciudad de santiago de chile, con vista al costanera center</figcaption>
                </figure>

                <figure>
                    <img src="https://images.unsplash.com/photo-1570075017462-b5478b3abfff?q=80&w=2403&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="montañas nevadas con animales" height="500px" width="700">
                    <figcaption>Vista trasera de las torres del paine, chile</figcaption>
                </figure>

                <figure>
                    <img src="https://images.unsplash.com/photo-1578704410892-86dbdab9b4e8?q=80&w=2831&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="montaña con un rio en medio" height="500px" width="700">
                    <figcaption>Volcan en la region de los lagos, chile</figcaption>
                </figure>
            </section>

            <section>
                <iframe 
                    width="700" 
                    height="500" 
                    src="https://www.youtube.com/embed/lxbuVQvm3Qo?si=zlKo1Snqvrf_KjtD" 
                    title="YouTube video player" 
                    frameborder="0" 
                    allow="accelerometer; 
                    autoplay; 
                    clipboard-write; 
                    encrypted-media; 
                    gyroscope; 
                    picture-in-picture; 
                    web-share" 
                    referrerpolicy="strict-origin-when-cross-origin" 
                    allowfullscreen>
                </iframe>
            </section>
        </main>

        <footer>
            <p>@2026 Acme Support</p>
        </footer>
    </div>

</html>
