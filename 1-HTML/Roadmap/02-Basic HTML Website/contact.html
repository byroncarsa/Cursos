<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Basdic HTML Website">

    <title>Basic HTML Website </title>

    <link rel="icon" href="favicon.png" type="image/x-icon">

    <link rel="stylesheet" href="style.css">

</head>
<body>
    <header class="menu container">
        <div class="logo">
            <img src="favicon.png" alt="Imagen del logo">
            <p>your name</p>
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="projects.html">Projects</a>
            <a href="articles.html">Articles</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <section class="title">
        <div>
            <h1>Contact</h1>
            <p>html only with proper layout, no tyling</p>
        </div>
    </section>


    <section class="container pt-20 contact">
        <h2>Contact us and we will respond as soon as possible.</h2>

        <div class="form">
            <form action="/my-handling-form-page" method="post">
                <div class="form-field">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="user_name" />
                </div>
                <div class="form-field">
                    <label for="mail">Email</label>
                    <input type="email" id="mail" name="user_email" />
                </div>
                <div class="form-field">
                    <label for="msg">Message</label>
                    <textarea id="msg" name="user_message"></textarea>
                </div>

                <button>Send</button>
            </form>
        </div>

        


    </section>


    <footer>
        <p>@all rights reserved 2025</p>
    </footer>
</body>
</html>
