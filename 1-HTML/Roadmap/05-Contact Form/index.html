<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact Form">

    <title>Contact Form</title>

    <link rel="icon" href="favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="container">
        <header>
            <p>Acme Support</p>

            <nav>
                <a href="#">Home</a>
                <a href="#">Help</a>
                <a href="#">Contact</a>
            </nav>
        </header>
        
        <hr>

        <main>
            <h1>Contact us</h1>
            <p>Send us a message and we will get back to you.</p>

            <form action="" method="post">
                <div class="input">
                    <label for="name">Full name</label>
                    <input type="text" id="name">
                </div>

                <div class="input">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>

                <div class="input">
                    <label for="Subject">Subject</label>
                    <select id="Subject">
                        <option value="0">Choose a topic</option>
                        <option value="1">Option 1</option>
                        <option value="2">Option 2</option>
                        <option value="3">Option 3</option>
                    </select>
                </div>

                <div class="input2">
                    <label for="message">Message</label>
                    <textarea id="message" minlength="10" required></textarea>
                </div>

                <div class="radio">
                    <div>
                        <label for="">How did you hear about us?</label>
                    </div>

                    <div class="radios">
                        <div>
                            <input type="radio">
                            <label for="">Search</label>
                        </div>

                        <div>
                            <input type="radio">
                            <label for="">Friend</label>
                        </div>

                        <div>
                            <input type="radio">
                            <label for="">Social media</label>
                        </div>
                    </div>
                    
                </div>

                <div class="input3">
                    <input type="checkbox" class="cuadrado">
                    <label for="">Send me product updates</label>
                </div>

                <input type="submit" value="Send message" class="button">

            </form>
        </main>

        <footer>
            <p>@2026 Acme Support</p>
        </footer>
    </div>
</body>
</html>
